name: Performance Testing With locust

on:
    push:
        branches: ["main"]
    workflow_dispatch:

jobs:
    performance-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.13'

            - name: Install Dependencies
              run: | 
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Start Application
              run: |
                python app.py &
                sleep 5

            - name: Run Locust Performance Test
              run: |
                locust -f locustfile.py --host http://127.0.0.1:5000 --users 50 --spawn-rate 5 --run-time 1m --headless --exit-code-on-error 1